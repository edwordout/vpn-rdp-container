pulse.properties = {
    # Prefer the inexpensive format used by the XRDP/FreeRDP path.
    pulse.default.format = S16LE
    pulse.default.position = [ FL FR ]

    # Honor Pulse clients that ask PipeWire-Pulse to fixate their stream format.
    pulse.fix.format = "S16LE"
    pulse.fix.rate = 44100
    pulse.fix.position = "[ FL FR ]"
}
